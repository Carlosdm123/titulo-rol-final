<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

<style>

body{
background:#1e1e1e;
color:#e6e6e6;
font-family:sans-serif;
margin:40px;
display:flex;
}

.version{
width:18px;
height:18px;
border-radius:50%;
background:#666;
margin-right:20px;
margin-top:5px;
}

.container{
flex:1;
}

.preview{
width:854px;
height:480px;
border:4px solid white;
margin:auto;
overflow:hidden;
}

iframe{
width:1920px;
height:1080px;
transform:scale(0.444);
transform-origin:top left;
border:none;
}

.previewButtons{
width:854px;
margin:15px auto 0 auto;
display:flex;
gap:10px;
justify-content:center;
}

.previewButtons button{
background:#2e2e2e;
color:white;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:4px;
}

.previewButtons button:hover{
background:#3d3d3d;
}

/* PANEL CON SCROLL */

.panel{
width:854px;
margin:auto;
margin-top:30px;
max-height:620px;
overflow-y:auto;
padding-right:4px;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
margin:10px 0;
background:#2a2a2a;
padding:10px;
border-radius:6px;
}

.item span{
flex:1;
margin-left:12px;
font-size:14px;
}

.switch{
position:relative;
display:inline-block;
width:42px;
height:22px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#555;
transition:.3s;
border-radius:22px;
}

.slider:before{
position:absolute;
content:"";
height:16px;
width:16px;
left:3px;
bottom:3px;
background:white;
transition:.3s;
border-radius:50%;
}

input:checked + .slider{
background:#2c8f6b;
}

input:checked + .slider:before{
transform:translateX(20px);
}

.deleteBtn{
margin-left:10px;
background:#444;
color:white;
border:none;
padding:4px 8px;
cursor:pointer;
border-radius:4px;
}

.deleteBtn:hover{
background:#aa3333;
}

.inputArea{
width:600px;
margin:40px auto;
text-align:center;
}

.inputArea input{
width:100%;
padding:10px;
margin-bottom:4px;
font-size:14px;
background:#2a2a2a;
color:white;
border:1px solid #555;
border-radius:6px;
}

.counter{
font-size:12px;
margin-bottom:8px;
text-align:right;
color:#aaa;
}

.addBtn{
margin-top:10px;
padding:8px 18px;
background:#2c8f6b;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
}

.addBtn:hover{
background:#38a77f;
}

</style>
</head>

<body>

<div class="version" id="connectionDot"></div>

<div class="container">

<div class="preview">
<iframe src="overlay.html"></iframe>
</div>

<div class="previewButtons">

<button onclick="openOverlay()">Abrir overlay</button>
<button onclick="copyOverlay()">Copiar URL para vMix</button>

</div>

<div class="panel" id="panel"></div>

<div class="inputArea">

<input id="newName" maxlength="70" placeholder="Nombre">
<div class="counter" id="countName">0 / 70</div>

<input id="newRole" maxlength="100" placeholder="Rol">
<div class="counter" id="countRole">0 / 100</div>

<button class="addBtn" onclick="addBanner()">Agregar</button>

</div>

</div>

<script>

const ably = new Ably.Realtime("bOKecA.9QsrUQ:0fDP1G0ebCieBR4lo6sS-CwOVg7MJZ6B-vDLgERRGug");
const channel = ably.channels.get("vmix-roles");

const connectionDot=document.getElementById("connectionDot");

ably.connection.on((stateChange)=>{

if(stateChange.current==="connected"){
connectionDot.style.background="#00ff7a";
}

if(stateChange.current==="connecting" || stateChange.current==="disconnected"){
connectionDot.style.background="#ffaa00";
}

if(stateChange.current==="suspended" || stateChange.current==="failed"){
connectionDot.style.background="#ff0033";
}

});

/* TITULOS PREESTABLECIDOS */

let banners=[

{name:"ALEJANDRA BARRIOS",role:"DIRECTORA DE LA MOE"},
{name:"ALEJANDRA TRUJILLO",role:"DIRECTORA DE PROYECTOS FESCOL"},
{name:"ANGÉLICA LAGOS",role:"EDITORA EN JEFE DE EL ESPECTADOR"},
{name:"CARLOS CHACÓN",role:"DIRECTOR ICP HERNÁN ECHAVARRÍA"},
{name:"CINDY MORALES",role:"EDITORA COLOMBIA +20 DE EL ESPECTADOR"},
{name:"DANIEL VALERO",role:"EDITOR POLÍTICO DE EL ESPECTADOR"},
{name:"DAVID EFRÉN ORTEGA",role:"PERIODISTA POLÍTICO DE EL ESPECTADOR"},
{name:"DIEGO SANTOS",role:"CONSULTOR Y PERIODISTA"},
{name:"ÉLBER GUTIÉRREZ ROA",role:"PRODUCTOR GENERAL DE EL ESPECTADOR"},
{name:"FIDEL CANO CORREA",role:"DIRECTOR DE EL ESPECTADOR"},
{name:"GUSTAVO MONTES",role:"PERIODISTA DE EL ESPECTADOR"},
{name:"KAREN QUINTERO",role:"PERIODISTA DE EL ESPECTADOR"},
{name:"LARIZA PIZANO",role:"COLUMNISTA DE EL ESPECTADOR"},
{name:"LEÓN VALENCIA",role:"DIRECTOR DE LA FUNDACIÓN PARES"},
{name:"MALEJA VICTORINO",role:"ANALISTA EXTITUTO POLÍTICA ABIERTA"},
{name:"MARCELA OSORIO",role:"EDITORA WEB DE EL ESPECTADOR"},
{name:"MARÍA ANGÉLICA GARCÍA",role:"PERIODISTA DE EL ESPECTADOR"},
{name:"MARÍA JOSÉ BARRIOS",role:"PERIODISTA POLÍTICA DE EL ESPECTADOR"},
{name:"NICOLÁS DÍAZ",role:"ANALISTA EXTITUTO POLÍTICA ABIERTA"},
{name:"PATRICIA MUÑOZ",role:"ANALISTA U JAVERIANA"},
{name:"PEDRO MENDOZA",role:"COLABORADOR DE EL ESPECTADOR"},
{name:"RAMIRO BEJARANO",role:"COLUMNISTA DE EL ESPECTADOR"},
{name:"SOFÍA MEDINA",role:"LÍDER DE DISTRIBUCIÓN DE CONTENIDO"},
{name:"WILSON CASTAÑEDA",role:"DIRECTOR CARIBE AFIRMATIVO"}

];

let activeIndex=null;
let autoOffTimer=null;

function render(){

const panel=document.getElementById("panel");

panel.innerHTML="";

banners.forEach((item,i)=>{

const row=document.createElement("div");
row.className="item";

const switchWrap=document.createElement("label");
switchWrap.className="switch";

const toggle=document.createElement("input");
toggle.type="checkbox";
toggle.checked=(activeIndex===i);
toggle.onchange=()=>toggleBanner(i);

const slider=document.createElement("span");
slider.className="slider";

switchWrap.appendChild(toggle);
switchWrap.appendChild(slider);

const label=document.createElement("span");
label.innerText=item.name;

const del=document.createElement("button");
del.innerText="Borrar";
del.className="deleteBtn";
del.onclick=()=>deleteBanner(i);

row.appendChild(switchWrap);
row.appendChild(label);
row.appendChild(del);

panel.appendChild(row);

});

}

function toggleBanner(i){

if(activeIndex===i){

channel.publish("banner",{action:"hide"});
activeIndex=null;
clearTimeout(autoOffTimer);
render();
return;

}

activeIndex=i;

channel.publish("banner",{
action:"show",
name:banners[i].name,
role:banners[i].role
});

clearTimeout(autoOffTimer);

autoOffTimer=setTimeout(()=>{

channel.publish("banner",{action:"hide"});
activeIndex=null;
render();

},11000);

render();

}

function deleteBanner(i){

banners.splice(i,1);

if(activeIndex===i){

channel.publish("banner",{action:"hide"});
activeIndex=null;

}

render();

}

function addBanner(){

const name=document.getElementById("newName").value.trim();
const role=document.getElementById("newRole").value.trim();

if(!name || !role) return;

banners.push({
name:name,
role:role
});

document.getElementById("newName").value="";
document.getElementById("newRole").value="";

updateCounter(nameInput,countName);
updateCounter(roleInput,countRole);

render();

}

function openOverlay(){
window.open("overlay.html","_blank");
}

function copyOverlay(){

const url=location.origin+location.pathname.replace("control.html","overlay.html");

navigator.clipboard.writeText(url);

alert("URL copiada para vMix");

}

render();

const nameInput=document.getElementById("newName");
const roleInput=document.getElementById("newRole");

const countName=document.getElementById("countName");
const countRole=document.getElementById("countRole");

function updateCounter(input,count){

const len=input.value.length;
const max=input.maxLength;

count.innerText=len+" / "+max;

if(len>=max){
input.style.border="2px solid #ff0033";
}else{
input.style.border="1px solid #555";
}

}

nameInput.addEventListener("input",()=>updateCounter(nameInput,countName));
roleInput.addEventListener("input",()=>updateCounter(roleInput,countRole));

</script>

</body>
</html>
